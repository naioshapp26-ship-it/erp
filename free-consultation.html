<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>استشارة مجانية | NAIOSH ERP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/newhome/styles.css" />
  <style>
    .page-hero {
      text-align: center;
      padding: 60px 20px 40px;
    }
    .page-hero .icon-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #c50712, #7a0009);
      color: #fff;
      font-size: 30px;
      margin-bottom: 20px;
      box-shadow: 0 8px 24px rgba(197, 7, 18, 0.3);
    }
    .page-hero h1 {
      margin: 0 0 14px;
      font-size: clamp(28px, 4vw, 46px);
      font-weight: 900;
      color: #1d222b;
    }
    .page-hero p {
      margin: 0 auto;
      max-width: 540px;
      color: var(--brand-text-muted, #5f6672);
      font-size: clamp(15px, 1.5vw, 18px);
      line-height: 1.7;
      font-weight: 600;
    }
    .booking-layout {
      max-width: 760px;
      margin: 0 auto 60px;
      padding: 0 16px;
    }
    .steps-row {
      display: flex;
      justify-content: center;
      gap: 0;
      margin-bottom: 36px;
      flex-wrap: wrap;
    }
    .step-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 100px;
      position: relative;
    }
    .step-item:not(:last-child)::after {
      content: '';
      position: absolute;
      top: 22px;
      left: 0;
      width: 100%;
      height: 2px;
      background: #e8eaf0;
      z-index: 0;
    }
    .step-num {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #c50712, #7a0009);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 900;
      position: relative;
      z-index: 1;
    }
    .step-label {
      font-size: 12px;
      font-weight: 700;
      color: #1d222b;
      text-align: center;
    }
    .booking-form {
      background: #fff;
      border-radius: 20px;
      padding: 36px 32px;
      border: 1px solid var(--brand-border, #e8eaf0);
      box-shadow: 0 6px 24px rgba(12, 14, 17, 0.07);
    }
    .booking-form h2 {
      margin: 0 0 24px;
      font-size: 20px;
      font-weight: 900;
      color: #1d222b;
      text-align: center;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 520px) { .form-row { grid-template-columns: 1fr; } }
    .form-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }
    .form-field label {
      font-size: 13px;
      font-weight: 700;
      color: #1d222b;
    }
    .form-field input,
    .form-field select,
    .form-field textarea {
      border: 1px solid #d9dde8;
      border-radius: 10px;
      padding: 10px 14px;
      font-family: inherit;
      font-size: 14px;
      color: #1d222b;
      background: #fafafa;
      transition: border-color 0.2s;
      outline: none;
    }
    .form-field input:focus,
    .form-field select:focus,
    .form-field textarea:focus {
      border-color: #c50712;
      background: #fff;
    }
    .form-field textarea { resize: vertical; min-height: 90px; }
    .free-badge {
      display: inline-block;
      background: linear-gradient(135deg, #c50712, #7a0009);
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      padding: 3px 12px;
      border-radius: 999px;
      margin-bottom: 18px;
    }
    .submit-btn {
      width: 100%;
      background: linear-gradient(135deg, #c50712, #7a0009);
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(197, 7, 18, 0.3);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      margin-top: 8px;
    }
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 26px rgba(197, 7, 18, 0.4);
    }
    .note-text {
      text-align: center;
      font-size: 12px;
      color: #5f6672;
      margin-top: 14px;
    }
  </style>
</head>
<body>
  <header class="top-nav">
    <div class="container inner">
      <a class="brand" href="/">
        <img src="/public/naiosh-logo.png" alt="شعار نايوش"/>
        <span class="logo-text">NAIOSH ERP</span>
      </a>
      <nav class="nav-links">
        <a href="/">الرئيسية</a>
        <a href="/products">منتجاتنا</a>
        <a href="/newhome/blog.html">المدونة</a>
        <a href="/newhome/branches.html">الفروع</a>
        <a href="/newhome/incubators.html">الحاضنات</a>
        <a href="/newhome/ads.html">الإعلانات</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="page-hero">
      <div class="icon-wrap"><i class="fas fa-comments"></i></div>
      <h1>استشارة مجانية</h1>
      <p>احجز استشارتك المجانية مع خبراء الإمبراطورة واحصل على رؤى استراتيجية دون أي تكلفة.</p>
    </section>

    <div class="booking-layout">
      <div class="steps-row">
        <div class="step-item">
          <div class="step-num">١</div>
          <span class="step-label">أدخل بياناتك</span>
        </div>
        <div class="step-item">
          <div class="step-num">٢</div>
          <span class="step-label">اختر الموعد</span>
        </div>
        <div class="step-item">
          <div class="step-num">٣</div>
          <span class="step-label">تأكيد الحجز</span>
        </div>
      </div>

      <div class="booking-form">
        <div style="text-align:center">
          <span class="free-badge"><i class="fas fa-gift"></i> مجاناً تماماً</span>
        </div>
        <h2>احجز موعد استشارتك</h2>

        <form>
          <div class="form-row">
            <div class="form-field">
              <label for="fc-name">الاسم الكامل</label>
              <input id="fc-name" type="text" placeholder="أدخل اسمك" />
            </div>
            <div class="form-field">
              <label for="fc-phone">رقم الجوال</label>
              <input id="fc-phone" type="tel" placeholder="+966 5X XXX XXXX" />
            </div>
          </div>
          <div class="form-field">
            <label for="fc-email">البريد الإلكتروني</label>
            <input id="fc-email" type="email" placeholder="your@email.com" />
          </div>
          <div class="form-row">
            <div class="form-field">
              <label for="fc-date">التاريخ المفضّل</label>
              <input id="fc-date" type="date" />
            </div>
            <div class="form-field">
              <label for="fc-topic">موضوع الاستشارة</label>
              <select id="fc-topic">
                <option value="">اختر الموضوع</option>
                <option value="business">أعمال واستراتيجية</option>
                <option value="hr">موارد بشرية</option>
                <option value="tech">تقنية ورقمنة</option>
                <option value="legal">قانوني وامتثال</option>
                <option value="other">أخرى</option>
              </select>
            </div>
          </div>
          <div class="form-field">
            <label for="fc-notes">ملاحظات إضافية</label>
            <textarea id="fc-notes" placeholder="أي تفاصيل تودّ مشاركتها مسبقاً…"></textarea>
          </div>
          <button type="submit" class="submit-btn"><i class="fas fa-calendar-check"></i> تأكيد الحجز</button>
          <p class="note-text">سيتواصل معك فريقنا خلال 24 ساعة لتأكيد الموعد.</p>
        </form>
      </div>
    </div>
  </main>

  <nav class="floating-actions" aria-label="أزرار جانبية عائمة">
    <a href="/newhome/ads.html" aria-label="إضافة"><i class="fas fa-plus"></i></a>
    <a href="/newhome/blog.html" aria-label="المدونة"><i class="fas fa-heart"></i></a>
    <a href="/contact-empire.html" aria-label="تواصل معنا"><i class="fas fa-comment-dots"></i></a>
    <button id="to-top" type="button" aria-label="الصعود للأعلى"><i class="fas fa-arrow-up"></i></button>
  </nav>
  <script>
    document.getElementById('to-top')?.addEventListener('click', () => {
      const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      window.scrollTo({ top: 0, behavior: reduced ? 'auto' : 'smooth' });
    });
  </script>
  <script src="/newhome/mobile-nav.js"></script>
</body>
</html>
