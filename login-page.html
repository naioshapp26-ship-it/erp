    <script>
        const loginForm = document.getElementById('loginForm');
        const alertMessage = document.getElementById('alertMessage');
        const loginBtn = document.getElementById('loginBtn');
        const btnText = loginBtn.querySelector('.btn-text');
        const loadingSpinner = loginBtn.querySelector('.loading-spinner');
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('togglePassword');
        const togglePasswordIcon = document.getElementById('togglePasswordIcon');
        const selfRegisterPrompt = document.getElementById('selfRegisterPrompt');
        const officeTestingDivider = document.getElementById('officeTestingDivider');
        const officeTestingSection = document.getElementById('officeTestingSection');

        if (togglePasswordBtn && passwordInput && togglePasswordIcon) {
            togglePasswordBtn.addEventListener('click', () => {
                const isHidden = passwordInput.type === 'password';
                passwordInput.type = isHidden ? 'text' : 'password';
                togglePasswordIcon.className = isHidden ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
                togglePasswordBtn.setAttribute('aria-pressed', String(isHidden));
                togglePasswordBtn.setAttribute('aria-label', isHidden ? 'إخفاء كلمة المرور' : 'إظهار كلمة المرور');
                passwordInput.focus();
            });
        }

        // ملء بيانات الدخول من الحسابات التجريبية
        function fillLogin(email, password) {
            document.getElementById('email').value = email;
            document.getElementById('password').value = password;
            // animate fill
            document.getElementById('email').parentElement.classList.add('ring-2', 'ring-primary/20');
            setTimeout(() => {
                document.getElementById('email').parentElement.classList.remove('ring-2', 'ring-primary/20');
            }, 500);
            // focus login
            document.getElementById('loginBtn').focus();

            // ارسال النموذج تلقائياً بعد ملء القيم
            if (typeof loginForm.requestSubmit === 'function') {
                loginForm.requestSubmit();
            } else {
                loginForm.dispatchEvent(new Event('submit', { cancelable: true, bubbles: true }));
            }
        }

        // عرض رسالة
        function showAlert(message, type = 'error') {
            alertMessage.textContent = message;
            alertMessage.classList.remove('hidden', 'bg-red-50', 'text-red-700', 'border-red-200', 'bg-green-50', 'text-green-700', 'border-green-200');
            
            if (type === 'error') {
                alertMessage.classList.add('bg-red-50', 'text-red-700', 'border-red-200');
                const icon = '<i class="fa-solid fa-circle-exclamation ml-2"></i>';
                alertMessage.innerHTML = icon + message;
            } else {
                alertMessage.classList.add('bg-green-50', 'text-green-700', 'border-green-200');
                const icon = '<i class="fa-solid fa-check-circle ml-2"></i>';
                alertMessage.innerHTML = icon + message;
            }
            
            alertMessage.classList.remove('hidden');
            
            setTimeout(() => {
                alertMessage.classList.add('hidden');
            }, 5000);
        }

        function getAuthContext() {
            const host = window.location.hostname.toLowerCase();
            const reserved = new Set(['www', 'app', 'api', 'admin', 'saas']);
            const parts = host.split('.');
            const baseDomain = parts.length >= 2 ? parts.slice(-2).join('.') : host;
            const subdomain = host.endsWith('.' + baseDomain)
                ? host.slice(0, host.length - baseDomain.length - 1)
                : null;
            const isTenant = Boolean(
                subdomain &&
                !subdomain.includes('.') &&
                !reserved.has(subdomain) &&
                host !== baseDomain &&
                host !== `www.${baseDomain}`
            );

            return {
                isTenant,
                loginEndpoint: isTenant ? '/api/tenant-auth/login' : '/api/auth/login',
                verifyEndpoint: isTenant ? '/api/tenant-auth/verify' : '/api/auth/verify'
            };
        }

        function applyTenantLoginPageMode() {
            const authContext = getAuthContext();
            if (!authContext.isTenant) return;

            if (selfRegisterPrompt) {
                selfRegisterPrompt.classList.add('hidden');
            }
            if (officeTestingDivider) {
                officeTestingDivider.classList.add('hidden');
            }
            if (officeTestingSection) {
                officeTestingSection.classList.add('hidden');
            }
        }

        applyTenantLoginPageMode();

        // إلغاء Service Worker القديم (يسبب ردود Betacademy مخزّنة لـ /api)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then((regs) => {
                regs.forEach((reg) => reg.unregister());
            }).catch(() => {});
        }

        // معالجة تسجيل الدخول
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            if (!email || !password) {
                showAlert('يرجى إدخال البريد الإلكتروني وكلمة المرور');
                return;
            }

            // تعطيل الزر وإظهار التحميل
            loginBtn.disabled = true;
            loginBtn.classList.add('opacity-75', 'cursor-not-allowed');
            btnText.classList.add('hidden');
            loadingSpinner.classList.remove('hidden');

            try {
                const authContext = getAuthContext();
                const payload = authContext.isTenant
                    ? { identifier: email, password }
                    : { email, password };

                console.group('[NAIOSH Login]');
                console.log('URL:', authContext.loginEndpoint);
                console.log('Payload:', { ...payload, password: '***' });

                const response = await fetch(authContext.loginEndpoint, {
                    method: 'POST',
                    cache: 'no-store',
                    credentials: 'same-origin',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                        'X-Requested-With': 'XMLHttpRequest'
                    },
                    body: JSON.stringify(payload)
                });

                const apiBuild = response.headers.get('X-Auth-Api-Build');
                const rawBody = await response.text();
                console.log('HTTP Status:', response.status, response.statusText);
                console.log('X-Auth-Api-Build:', apiBuild || '(غير موجود — الملف القديم لم يُرفع)');
                console.log('Raw body (first 500 chars):', rawBody.slice(0, 500));

                let result;
                try {
                    result = rawBody ? JSON.parse(rawBody) : {};
                    console.log('Parsed JSON:', result);
                } catch (parseError) {
                    console.error('Login response was not JSON');
                    const wrongApp = /Betacademy|beta-logo|index-BDcwhEVX/i.test(rawBody);
                    if (wrongApp) {
                        console.error('[NAIOSH] ⚠️ الدومين يخدم تطبيق Betacademy وليس ERP — /api لا يصل لـ Node');
                        showAlert('إعدادات الاستضافة خاطئة: الموقع يعرض Betacademy بدل نظام نايوش. راجع Document Root و Node.js App في cPanel.');
                    } else {
                        showAlert('خطأ تقني: السيرفر لم يرجع JSON. راجع cPanel → Node.js → Restart ومسار التطبيق.');
                    }
                    try {
                        const dbg = await fetch('/api/auth/ping', {
                            cache: 'no-store',
                            headers: { Accept: 'application/json', 'X-Requested-With': 'XMLHttpRequest' }
                        });
                        const dbgText = await dbg.text();
                        console.log('[NAIOSH Debug]', dbg.status, dbgText.slice(0, 300));
                        if (/Betacademy|beta-logo/i.test(dbgText)) {
                            console.error('[NAIOSH Debug] نفس المشكلة: /api/auth/debug يُرجع HTML Betacademy — Node ERP غير مربوط بالدومين');
                        }
                    } catch (dbgErr) {
                        console.error('[NAIOSH Debug] failed', dbgErr);
                    }
                    console.groupEnd();
                    return;
                }
                console.groupEnd();

                if (!apiBuild) {
                    console.warn('⚠️ auth-api.js القديم على السيرفر — ارفع الملف الجديد واعمل Restart');
                }

                if (!result.success && (result.detail || result.step)) {
                    console.error('[Login failed]', {
                        step: result.step,
                        detail: result.detail,
                        code: result.code,
                        apiBuild: result.apiBuild
                    });
                }

                if (result.success) {
                    showAlert('تم تسجيل الدخول بنجاح! جاري تحويلك...', 'success');

                    const sessionToken = result.data?.session?.token;
                    const user = result.data?.user || result.user;
                    const menu = result.data?.menu || result.menu || null;

                    // حفظ البيانات
                    const storage = rememberMe ? localStorage : sessionStorage;
                    storage.setItem('authToken', sessionToken);
                    storage.setItem('user', JSON.stringify(user));
                    if (menu) {
                        storage.setItem('menu', JSON.stringify(menu));
                    }
                    const maxAge = rememberMe ? `; Max-Age=${60 * 60 * 24}` : '';
                    document.cookie = `authToken=${encodeURIComponent(sessionToken)}; Path=/; SameSite=Lax${maxAge}`;

                    // عرض معلومات المستخدم في Console
                    console.log('✅ تم تسجيل الدخول بنجاح');
                    console.log('👤 المستخدم:', user);

                    // التوجيه حسب صلاحيات المستخدم
                    setTimeout(() => {
                        // Check for both property styles (snake_case and camelCase) just in case
                        const entityId = user.entity_id || user.entityId;
                        
                        if (!authContext.isTenant && entityId === 'HQ001') {
                            window.location.href = '/super-admin-page.html';
                        } else {
                            window.location.href = '/index.html'; 
                        }
                    }, 1000);

                } else {
                    const debugHint = result.step && result.detail
                        ? ` [${result.step}: ${result.detail}]`
                        : (result.detail ? ` (${result.detail})` : '');
                    showAlert((result.message || 'فشل تسجيل الدخول') + debugHint);
                    loginBtn.disabled = false;
                    loginBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                    btnText.classList.remove('hidden');
                    loadingSpinner.classList.add('hidden');
                }

            } catch (error) {
                console.error('Login error:', error);
                showAlert('حدث خطأ في الاتصال. يرجى المحاولة مرة أخرى');
                loginBtn.disabled = false;
                loginBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                btnText.classList.remove('hidden');
                loadingSpinner.classList.add('hidden');
            }
        });

        // التحقق من الجلسة الحالية
        window.addEventListener('load', () => {
            const token = localStorage.getItem('authToken') || sessionStorage.getItem('authToken');
            
            if (token) {
                const authContext = getAuthContext();
                // التحقق من صحة الجلسة
                fetch(authContext.verifyEndpoint, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                })
                .then(res => res.json())
                .then(result => {
                    if (result.success) {
                        showAlert('لديك جلسة نشطة بالفعل. جاري تحويلك...', 'success');
                        setTimeout(() => {
                            const user = result.data?.user || result.user;
                            const entityId = user?.entity_id || user?.entityId;
                            if (!authContext.isTenant && entityId === 'HQ001') {
                                window.location.href = '/super-admin-page.html';
                            } else {
                                window.location.href = '/index.html';
                            }
                        }, 1000);
                    } else {
                        localStorage.removeItem('authToken');
                        sessionStorage.removeItem('authToken');
                        document.cookie = 'authToken=; Max-Age=0; Path=/; SameSite=Lax';
                    }
                })
                .catch(err => {
                    console.log('Session verification check failed (which is normal if not logged in)');
                    localStorage.removeItem('authToken');
                    sessionStorage.removeItem('authToken');
                    document.cookie = 'authToken=; Max-Age=0; Path=/; SameSite=Lax';
                });
            }
        });
    </script>
</body>
</html>
