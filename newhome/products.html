<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>منتجاتنا | NAIOSH ERP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/newhome/styles.css" />
  <link rel="stylesheet" href="/newhome/dark-mode.css" />
  <style>
    /* ── Page layout ── */
    .products-page { margin: 0 auto 80px; }

    /* ── Hero ── */
    .products-hero {
      text-align: center;
      padding: 56px 20px 40px;
    }
    .products-hero h1 {
      margin: 0 0 14px;
      font-size: clamp(32px, 4.5vw, 52px);
      font-weight: 900;
      color: #1d222b;
      letter-spacing: -0.5px;
    }
    .products-hero p {
      margin: 0 auto 28px;
      max-width: 560px;
      color: var(--brand-text-muted, #5f6672);
      font-size: clamp(15px, 1.5vw, 18px);
      line-height: 1.7;
      font-weight: 600;
    }
    .products-stats {
      display: flex;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
    }
    .products-stat {
      background: #fff;
      border: 1px solid var(--brand-border, #e8eaf0);
      border-radius: 14px;
      padding: 14px 28px;
      box-shadow: 0 4px 14px rgba(12,14,17,.06);
      text-align: center;
      min-width: 110px;
    }
    .products-stat strong {
      display: block;
      font-size: 26px;
      font-weight: 900;
      color: #c50712;
      line-height: 1;
    }
    .products-stat span {
      font-size: 12px;
      color: #5f6672;
      font-weight: 700;
      margin-top: 4px;
      display: block;
    }

    /* ── Section tabs ── */
    .products-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      padding: 24px 16px 8px;
    }
    .products-tab {
      background: #fff;
      border: 1.5px solid rgba(197,7,18,.25);
      color: #c50712;
      padding: 8px 20px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      transition: background .2s, color .2s, border-color .2s;
    }
    .products-tab:hover,
    .products-tab.active {
      background: #c50712;
      color: #fff;
      border-color: #c50712;
    }

    /* ── Section headings ── */
    .product-section { margin-bottom: 56px; }
    .product-section-head {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 4px 18px;
      border-bottom: 2px solid #f0f2f7;
      margin-bottom: 24px;
    }
    .product-section-head .section-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, #c50712, #7a0009);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .product-section-head h2 {
      margin: 0;
      font-size: 20px;
      font-weight: 900;
      color: #1d222b;
    }
    .product-section-count {
      margin-right: auto;
      background: rgba(197,7,18,.1);
      color: #c50712;
      font-size: 12px;
      font-weight: 800;
      padding: 3px 12px;
      border-radius: 999px;
    }

    /* ── Product grid ── */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 20px;
    }

    /* ── Product card ── */
    .product-card {
      display: flex;
      flex-direction: column;
      background: #fff;
      border-radius: 20px;
      padding: 28px 22px 22px;
      border: 1px solid var(--brand-border, #e8eaf0);
      box-shadow: 0 6px 22px rgba(12,14,17,.07);
      text-decoration: none;
      color: inherit;
      transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
      /* fade-in initial state */
      opacity: 0;
      transform: translateY(22px);
    }
    .product-card.visible {
      opacity: 1;
      transform: translateY(0);
      transition: opacity .45s ease, transform .45s ease,
                  box-shadow .25s ease, border-color .25s ease;
    }
    .product-card:hover {
      transform: translateY(-7px) scale(1.015);
      box-shadow: 0 20px 42px rgba(12,14,17,.13);
      border-color: #f3c3cb;
    }
    .product-card .card-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: linear-gradient(135deg, #c50712, #7a0009);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin-bottom: 16px;
      flex-shrink: 0;
      transition: transform .22s ease;
    }
    .product-card:hover .card-icon {
      transform: scale(1.1) rotate(-4deg);
    }
    .product-card h3 {
      margin: 0 0 8px;
      font-size: 15px;
      font-weight: 800;
      color: #1d222b;
      line-height: 1.4;
    }
    .product-card p {
      margin: 0 0 18px;
      font-size: 13px;
      color: #5f6672;
      line-height: 1.65;
      flex: 1;
    }
    .product-card .card-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      border: 1.5px solid rgba(197,7,18,.35);
      color: #c50712;
      padding: 8px 18px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      align-self: flex-start;
      transition: background .2s, color .2s, border-color .2s;
      text-decoration: none;
    }
    .product-card:hover .card-btn,
    .product-card .card-btn:hover {
      background: #c50712;
      color: #fff;
      border-color: #c50712;
    }

    /* ── Responsive ── */
    @media (max-width: 1050px) {
      .product-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
    @media (max-width: 700px) {
      .product-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
      .product-card { padding: 20px 16px 16px; }
    }
    @media (max-width: 400px) {
      .product-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <script>try{if(localStorage.getItem('theme')==='dark')document.body.classList.add('dark-mode')}catch(_){}</script>
  <header class="top-nav">
    <div class="container inner">
      <a class="brand" href="/">
        <img src="/public/naiosh-logo.png" alt="شعار نايوش"/>
        <span class="logo-text">NAIOSH ERP</span>
      </a>
      <nav class="nav-links">
        <a href="/">الرئيسية</a>
        <a class="active" href="/products">منتجاتنا</a>
        <a href="/newhome/blog.html">المدونة</a>
        <a href="/newhome/branches.html">الفروع</a>
        <a href="/newhome/incubators.html">الحاضنات</a>
        <a href="/newhome/ads.html">الإعلانات</a>
      </nav>
    </div>
  </header>

  <main class="container products-page">
    <section class="products-hero">
      <h1>منتجاتنا</h1>
      <p>اكتشف مجموعة حلول نايوش ERP المتكاملة المصممة لتحويل أعمالك رقمياً بكفاءة عالية.</p>
      <div class="products-stats">
        <div class="products-stat"><strong>30+</strong><span>منتج</span></div>
        <div class="products-stat"><strong>6</strong><span>قطاعات</span></div>
        <div class="products-stat"><strong>100%</strong><span>رقمي</span></div>
        <div class="products-stat"><strong>ERP</strong><span>متكامل</span></div>
      </div>
    </section>

    <nav class="products-tabs" id="productsTabs" aria-label="أقسام المنتجات"></nav>

    <div id="productsSections"></div>
  </main>

  <nav class="floating-actions" aria-label="أزرار جانبية عائمة">
    <a href="/newhome/ads.html" aria-label="إضافة"><i class="fas fa-plus"></i></a>
    <a href="/newhome/blog.html" aria-label="المدونة"><i class="fas fa-heart"></i></a>
    <a href="/newhome/ads.html" aria-label="تواصل معنا"><i class="fas fa-comment-dots"></i></a>
    <button id="to-top" type="button" aria-label="الصعود للأعلى"><i class="fas fa-arrow-up"></i></button>
  </nav>

  <script>
    /* ── Product catalog data ── */
    const catalog = [
      {
        section: 'الأنظمة والإدارة',
        icon: 'fa-sitemap',
        products: [
          { slug: 'user-interface',   icon: 'fa-display',          name: 'واجهة المستخدم',          desc: 'لوحة تحكم مركزية بتصميم عصري تتيح إدارة جميع وحدات النظام من مكان واحد.' },
          { slug: 'home-dashboard',   icon: 'fa-house',            name: 'الرئيسية',                desc: 'الصفحة الرئيسية للنظام مع ملخص فوري للمؤشرات والأنشطة الحديثة.' },
          { slug: 'org-chart',        icon: 'fa-sitemap',          name: 'الهيكل الهرمي',           desc: 'رسم بياني تفاعلي يعرض بنية المؤسسة ومستويات الإدارة بشكل واضح.' },
          { slug: 'roles-permissions',icon: 'fa-user-shield',      name: 'إدارة الأدوار والصلاحيات', desc: 'تحديد صلاحيات دقيقة لكل دور وظيفي لضمان أمان البيانات.' },
          { slug: 'strategic-mgmt',   icon: 'fa-chess',            name: 'الإدارة الاستراتيجية',    desc: 'أدوات تخطيط استراتيجي ومتابعة الأهداف على المستوى المؤسسي.' },
          { slug: 'member-management',icon: 'fa-id-card',          name: 'إدارة الأعضاء',           desc: 'تسجيل وإدارة بيانات الأعضاء والمشتركين مع تتبع حالة كل عضو.' },
          { slug: 'subscriptions',    icon: 'fa-credit-card',      name: 'إدارة الاشتراكات',        desc: 'إدارة خطط الاشتراك والدفع وتجديد العقود بشكل آلي.' },
          { slug: 'system-log',       icon: 'fa-clipboard-list',   name: 'سجل النظام',              desc: 'توثيق جميع العمليات والتغييرات لأغراض المراجعة والتدقيق.' },
          { slug: 'identity-settings',icon: 'fa-fingerprint',      name: 'إعدادات الهوية',          desc: 'تخصيص هوية المؤسسة البصرية واللغوية على مستوى النظام.' },
        ]
      },
      {
        section: 'التعليم والتدريب',
        icon: 'fa-graduation-cap',
        products: [
          { slug: 'education-system', icon: 'fa-graduation-cap',   name: 'نظام التعليم',            desc: 'منصة تعليمية متكاملة تدعم المحتوى التفاعلي والاختبارات والشهادات.' },
          { slug: 'beta-digital-club',icon: 'fa-flask',            name: 'نادي بيتا الرقمي',        desc: 'بيئة تجريبية للمطورين والمبتكرين لتجربة أحدث ميزات النظام.' },
          { slug: 'certifications',   icon: 'fa-award',            name: 'الشهادات والابتكارات',    desc: 'إصدار الشهادات المعتمدة وتتبع الإنجازات لكل مستخدم.' },
          { slug: 'initiatives',      icon: 'fa-rocket',           name: 'المبادرات',               desc: 'إطلاق وإدارة المبادرات الداخلية وقياس أثرها على المؤسسة.' },
        ]
      },
      {
        section: 'الإعلانات والتسويق',
        icon: 'fa-bullhorn',
        products: [
          { slug: 'marketing-sales',  icon: 'fa-bullhorn',         name: 'التسويق والبيع',          desc: 'أدوات تسويق رقمي متكاملة وإدارة حملات البيع وتحليل الأداء.' },
          { slug: 'automation',       icon: 'fa-bolt',             name: 'الإنترنت والأتمتة',       desc: 'أتمتة العمليات التسويقية وربط القنوات الرقمية بشكل سلس.' },
          { slug: 'platforms',        icon: 'fa-layer-group',      name: 'المنصات',                 desc: 'ربط وإدارة منصات التواصل الاجتماعي وقنوات البيع الإلكتروني.' },
        ]
      },
      {
        section: 'التقنية والأنظمة',
        icon: 'fa-microchip',
        products: [
          { slug: 'dev-center',       icon: 'fa-code',             name: 'مركز المطورين',           desc: 'واجهات API، توثيق تقني، وأدوات بناء تكاملات مخصصة مع النظام.' },
          { slug: 'governance',       icon: 'fa-shield-halved',    name: 'الحوكمة والأمنية',        desc: 'سياسات حوكمة بيانات صارمة وحماية متقدمة من التهديدات الأمنية.' },
          { slug: 'project-mgmt',     icon: 'fa-diagram-project',  name: 'نظام إدارة المشاريع',     desc: 'تخطيط وتتبع المشاريع بلوحة مهام بصرية ومؤشرات تقدم حية.' },
          { slug: 'naiosh-fit',       icon: 'fa-dumbbell',         name: 'نظام نايوش فيت',          desc: 'نظام متخصص في إدارة المرافق الرياضية والاشتراكات الصحية.' },
          { slug: 'business-class',   icon: 'fa-briefcase',        name: 'نظام البزنس كلاس',        desc: 'حل متكامل للشركات يشمل الأتمتة والتحليلات المتقدمة وإدارة الأعمال.' },
        ]
      },
      {
        section: 'الأعمال والاستشارات',
        icon: 'fa-handshake',
        products: [
          { slug: 'services',         icon: 'fa-headset',          name: 'الخدمات',                 desc: 'منظومة متكاملة لإدارة طلبات الخدمة ومستوى الدعم وفق SLA محدد.' },
          { slug: 'hr',               icon: 'fa-people-group',     name: 'الموارد البشرية',          desc: 'نظام HR شامل يغطي التوظيف وكشوف الرواتب والأداء والتطوير الوظيفي.' },
          { slug: 'finance',          icon: 'fa-chart-pie',        name: 'المالية',                 desc: 'إدارة الحسابات والتقارير المالية والميزانيات بدقة وشفافية عالية.' },
          { slug: 'employees',        icon: 'fa-users',            name: 'إدارة الموظفين',          desc: 'ملف شامل لكل موظف يشمل بياناته ومساره الوظيفي وحضوره واجازاته.' },
          { slug: 'clients',          icon: 'fa-handshake',        name: 'العملاء',                 desc: 'إدارة علاقات العملاء (CRM) لمتابعة التفاعلات وفرص البيع.' },
          { slug: 'tasks',            icon: 'fa-list-check',       name: 'المهام',                  desc: 'تكليف وتتبع المهام بين الفرق مع أولويات وتواريخ استحقاق واضحة.' },
          { slug: 'legal',            icon: 'fa-scale-balanced',   name: 'القانونية والمحاماة',      desc: 'إدارة العقود والوثائق القانونية والمواعيد القضائية بكل سهولة.' },
        ]
      },
      {
        section: 'الحاضنات والتخصصات',
        icon: 'fa-seedling',
        products: [
          { slug: 'incubators',       icon: 'fa-seedling',         name: 'الحاضنات',                desc: 'برامج دعم شاملة للشركات الناشئة من الفكرة حتى التشغيل التجاري.' },
          { slug: 'branches',         icon: 'fa-code-branch',      name: 'الفروع',                  desc: 'إدارة فروع المؤسسة الجغرافية مع مزامنة البيانات آنياً.' },
        ]
      }
    ];

    /* ── Build tabs & sections ── */
    const tabsRoot = document.getElementById('productsTabs');
    const sectionsRoot = document.getElementById('productsSections');

    catalog.forEach((cat, idx) => {
      /* tab */
      const tab = document.createElement('button');
      tab.type = 'button';
      tab.className = 'products-tab';
      tab.textContent = cat.section;
      tab.addEventListener('click', () => {
        document.getElementById(`ps-${idx}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
      tabsRoot.appendChild(tab);

      /* section wrapper */
      const section = document.createElement('section');
      section.className = 'product-section';
      section.id = `ps-${idx}`;

      /* section header */
      const head = document.createElement('div');
      head.className = 'product-section-head';
      head.innerHTML = `
        <div class="section-icon"><i class="fas ${cat.icon}"></i></div>
        <h2>${cat.section}</h2>
        <span class="product-section-count">${cat.products.length} منتج</span>
      `;
      section.appendChild(head);

      /* grid */
      const grid = document.createElement('div');
      grid.className = 'product-grid';

      cat.products.forEach(p => {
        const card = document.createElement('a');
        card.className = 'product-card';
        card.href = `/products/${p.slug}`;
        card.setAttribute('aria-label', p.name);
        card.innerHTML = `
          <div class="card-icon"><i class="fas ${p.icon}"></i></div>
          <h3>${p.name}</h3>
          <p>${p.desc}</p>
          <span class="card-btn"><i class="fas fa-arrow-left"></i> عرض التفاصيل</span>
        `;
        grid.appendChild(card);
      });

      section.appendChild(grid);
      sectionsRoot.appendChild(section);
    });

    /* ── Fade-in on scroll ── */
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.08 });

    document.querySelectorAll('.product-card').forEach(c => observer.observe(c));

    /* ── Active tab highlight on scroll ── */
    const sectionEls = catalog.map((_, i) => document.getElementById(`ps-${i}`));
    const tabEls = tabsRoot.querySelectorAll('.products-tab');
    const activateTab = () => {
      let current = 0;
      sectionEls.forEach((el, i) => {
        if (el && el.getBoundingClientRect().top <= 120) current = i;
      });
      tabEls.forEach((t, i) => t.classList.toggle('active', i === current));
    };
    window.addEventListener('scroll', activateTab, { passive: true });
    activateTab();

    /* ── Back-to-top ── */
    document.getElementById('to-top')?.addEventListener('click', () => {
      const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      window.scrollTo({ top: 0, behavior: reduced ? 'auto' : 'smooth' });
    });
  </script>
  <script src="/newhome/mobile-nav.js"></script>
  <script src="/newhome/dark-mode.js"></script>
</body>
</html>
