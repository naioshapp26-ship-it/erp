<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مدونة New Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/newhome/styles.css" />
  <link rel="stylesheet" href="/newhome/dark-mode.css" />
</head>
<body>
  <script>try{if(localStorage.getItem('theme')==='dark')document.body.classList.add('dark-mode')}catch(_){}</script>
  <header class="top-nav">
    <div class="container inner">
      <a class="brand" href="/">
        <img src="/public/naiosh-logo.png" alt="شعار نايوش"/>
        <span class="logo-text">NAIOSH ERP</span>
      </a>
      <nav class="nav-links" aria-label="القائمة الرئيسية"></nav>
    </div>
  </header>
  <main class="container">
    <section class="section-head"><div><h2>مدونة المنصة</h2><p>محتوى مبسط بنفس الهوية البصرية المطلوبة.</p></div></section>
    <section class="cards">
      <article class="card"><div class="icon-box"><i class="fas fa-pen"></i></div><h3>كيف تبدأ برنامجك</h3><p>خطوات واضحة لبدء البرنامج مع فريق الحاضنة.</p></article>
      <article class="card"><div class="icon-box"><i class="fas fa-lightbulb"></i></div><h3>أفضل الممارسات</h3><p>إرشادات لرفع جودة التنفيذ والتشغيل اليومي.</p></article>
      <article class="card"><div class="icon-box"><i class="fas fa-chart-line"></i></div><h3>مؤشرات الأداء</h3><p>طرق متابعة النمو والأثر بشكل دوري ومنظّم.</p></article>
    </section>
  </main>
  <nav class="floating-actions" aria-label="أزرار جانبية عائمة">
    <a href="/newhome/ads.html" title="إضافة" aria-label="إضافة"><i class="fas fa-plus"></i></a>
    <a href="/members" title="الأعضاء" aria-label="الأعضاء"><i class="fas fa-heart"></i></a>
    <a href="/contact-empire.html" title="رسائل" aria-label="رسائل"><i class="fas fa-envelope"></i></a>
    <button id="to-top" type="button" aria-label="الصعود للأعلى"><i class="fas fa-arrow-up"></i></button>
  </nav>
  <script>
    document.getElementById('to-top')?.addEventListener('click', () => {
      const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      window.scrollTo({ top: 0, behavior: reduced ? 'auto' : 'smooth' });
    });
  </script>
  <script src="/newhome/landing-nav.js"></script>
  <script src="/newhome/mobile-nav.js"></script>
  <script src="/newhome/dark-mode.js"></script>
</body>
</html>
