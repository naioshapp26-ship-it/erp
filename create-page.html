<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>أنشئ صفحتك | NAIOSH</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { --red:#d70000; --red-dark:#6a0009; --bg:#08090d; --card:#13151d; --line:#2b2f3a; --text:#f8f9fb; --muted:#a6afc3; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:'Cairo',sans-serif; background: radial-gradient(circle at 20% 10%, #2b0b12 0%, #090b10 40%, #06070a 100%); color:var(--text); }
    .container { width:min(1200px, 100% - 32px); margin:20px auto; }
    .top { display:flex; gap:12px; flex-wrap:wrap; align-items:center; justify-content:space-between; }
    .btn { text-decoration:none; border:none; cursor:pointer; border-radius:14px; padding:10px 16px; font-weight:800; display:inline-flex; align-items:center; gap:8px; }
    .btn-primary { color:#fff; background:linear-gradient(135deg, var(--red), var(--red-dark)); }
    .btn-dark { color:#fff; background:#1b1f29; border:1px solid #2f3544; }
    .grid { margin-top:16px; display:grid; grid-template-columns:1.1fr .9fr; gap:16px; }
    .card { background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)); border:1px solid var(--line); border-radius:20px; padding:18px; backdrop-filter: blur(6px); }
    h1,h2,h3 { margin:0 0 10px; }
    label { display:block; font-size:13px; margin-bottom:6px; color:#d8def0; }
    input, textarea { width:100%; border-radius:12px; border:1px solid #323848; background:#11141c; color:#fff; padding:10px 12px; font-family:inherit; }
    textarea { min-height:88px; resize:vertical; }
    .field { margin-bottom:12px; }
    .cols { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .muted { color:var(--muted); font-size:13px; }
    .status { font-size:12px; margin-top:6px; }
    .status.ok { color:#6cf4ad; } .status.bad { color:#ff7d7d; }
    .custom-link { border:1px solid #303646; border-radius:12px; padding:10px; margin-bottom:8px; background:#0f131b; }
    .preview-wrap { position:sticky; top:14px; }
    .preview { overflow:hidden; border-radius:20px; border:1px solid #343a4a; background:#0b0e13; }
    .cover { height:140px; background:#1a1f2a center/cover no-repeat; }
    .avatar { width:92px; height:92px; border-radius:50%; border:3px solid #fff; margin:-46px auto 10px; background:#1c2431 center/cover no-repeat; }
    .preview-body { padding:0 14px 14px; text-align:center; }
    .socials { display:grid; gap:8px; margin-top:12px; }
    .socials a { text-decoration:none; color:#fff; border-radius:10px; padding:10px; font-weight:800; background:linear-gradient(135deg, #1c2230, #151924); border:1px solid #2d3443; }
    @media (max-width: 940px){ .grid { grid-template-columns:1fr; } .preview-wrap{position:static;} .cols{grid-template-columns:1fr;} }
  </style>
</head>
<body>
  <div class="container">
    <div class="top">
      <div>
        <h1>أنشئ صفحتك</h1>
        <p class="muted">صفحتك الشخصية القابلة للمشاركة داخل المنصة</p>
      </div>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <a class="btn btn-dark" href="/creators"><i class="fas fa-compass"></i> اكتشف الصفحات</a>
        <a class="btn btn-dark" href="/my-page-analytics"><i class="fas fa-chart-column"></i> إحصائيات صفحتي</a>
        <a class="btn btn-primary" id="openPublicPageBtn" href="#"><i class="fas fa-up-right-from-square"></i> فتح صفحتي</a>
      </div>
    </div>

    <div class="grid">
      <section class="card">
        <h2>بيانات الصفحة</h2>
        <form id="creatorForm">
          <div class="cols">
            <div class="field"><label>الاسم</label><input required name="name" id="nameInput" /></div>
            <div class="field"><label>اسم المستخدم (slug)</label><input required name="username" id="usernameInput" pattern="[a-z0-9_-]{3,30}" /></div>
          </div>
          <div class="status" id="usernameStatus"></div>
          <div class="cols">
            <div class="field"><label>صورة الملف الشخصي</label><input type="file" accept="image/*" name="profileImage" id="profileImageInput" /></div>
            <div class="field"><label>صورة الغلاف (اختياري)</label><input type="file" accept="image/*" name="coverImage" id="coverImageInput" /></div>
          </div>
          <div class="field"><label>نبذة / وصف</label><textarea name="bio" id="bioInput"></textarea></div>
          <div class="cols">
            <div class="field"><label>الهاتف (اختياري)</label><input name="phone" id="phoneInput" /></div>
            <div class="field"><label>البريد الإلكتروني (اختياري)</label><input type="email" name="email" id="emailInput" /></div>
          </div>

          <h3>روابط التواصل</h3>
          <div class="cols">
            <div class="field"><label>WhatsApp</label><input name="whatsapp" id="whatsappInput" placeholder="https://wa.me/..." /></div>
            <div class="field"><label>Facebook</label><input name="facebook" id="facebookInput" placeholder="https://facebook.com/..." /></div>
            <div class="field"><label>Instagram</label><input name="instagram" id="instagramInput" placeholder="https://instagram.com/..." /></div>
            <div class="field"><label>YouTube</label><input name="youtube" id="youtubeInput" placeholder="https://youtube.com/..." /></div>
            <div class="field"><label>Snapchat</label><input name="snapchat" id="snapchatInput" placeholder="https://snapchat.com/..." /></div>
            <div class="field"><label>TikTok</label><input name="tiktok" id="tiktokInput" placeholder="https://tiktok.com/..." /></div>
          </div>

          <h3>روابط مخصصة</h3>
          <div id="customLinks"></div>
          <button type="button" class="btn btn-dark" id="addCustomLinkBtn"><i class="fas fa-plus"></i> إضافة رابط مخصص</button>

          <div style="margin-top:14px; display:flex; gap:8px; flex-wrap:wrap;">
            <button class="btn btn-primary" type="submit"><i class="fas fa-floppy-disk"></i> حفظ الصفحة</button>
            <span class="muted" id="saveStatus"></span>
          </div>
        </form>
      </section>

      <aside class="preview-wrap">
        <section class="card">
          <h2>معاينة مباشرة</h2>
          <div class="preview">
            <div class="cover" id="previewCover"></div>
            <div class="avatar" id="previewAvatar"></div>
            <div class="preview-body">
              <h3 id="previewName">الاسم</h3>
              <p class="muted" id="previewBio">اكتب نبذة قصيرة عنك...</p>
              <div class="socials" id="previewSocials"></div>
            </div>
          </div>
        </section>
        <section class="card" id="adminCard" hidden>
          <h2>تحكم المدير</h2>
          <p class="muted">تعطيل/حذف الصفحات ومراقبة المحتوى</p>
          <div id="adminList" style="display:grid; gap:8px;"></div>
        </section>
      </aside>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('authToken') || sessionStorage.getItem('authToken');

    const form = document.getElementById('creatorForm');
    const customLinks = document.getElementById('customLinks');
    const usernameInput = document.getElementById('usernameInput');
    const usernameStatus = document.getElementById('usernameStatus');
    const saveStatus = document.getElementById('saveStatus');
    const openPublicPageBtn = document.getElementById('openPublicPageBtn');

    const previewName = document.getElementById('previewName');
    const previewBio = document.getElementById('previewBio');
    const previewAvatar = document.getElementById('previewAvatar');
    const previewCover = document.getElementById('previewCover');
    const previewSocials = document.getElementById('previewSocials');

    let usernameAvailable = true;
    let usernameTimer = null;

    const toSafeText = (v='') => String(v);
    const toSafeHttpUrl = (value='') => {
      const trimmed = String(value || '').trim();
      if (!trimmed) return '';
      try {
        const parsed = new URL(trimmed);
        if (parsed.protocol === 'http:' || parsed.protocol === 'https:') return parsed.toString();
      } catch (_e) {}
      return '';
    };

    const addCustomLinkRow = (label = '', url = '') => {
      const row = document.createElement('div');
      row.className = 'custom-link';
      row.innerHTML = `
        <div class="cols">
          <div><label>العنوان</label><input class="custom-link-label" /></div>
          <div><label>الرابط</label><input class="custom-link-url" /></div>
        </div>
        <div style="margin-top:8px;"><button type="button" class="btn btn-dark remove-link"><i class="fas fa-trash"></i> حذف</button></div>
      `;
      row.querySelector('.custom-link-label').value = toSafeText(label);
      row.querySelector('.custom-link-url').value = toSafeText(url);
      row.querySelector('.remove-link').addEventListener('click', () => { row.remove(); renderPreview(); });
      row.querySelectorAll('input').forEach((input) => input.addEventListener('input', renderPreview));
      customLinks.appendChild(row);
    };

    document.getElementById('addCustomLinkBtn').addEventListener('click', () => addCustomLinkRow());

    const getCustomLinks = () => Array.from(customLinks.querySelectorAll('.custom-link')).map((item) => ({
      label: item.querySelector('.custom-link-label').value.trim(),
      url: item.querySelector('.custom-link-url').value.trim()
    })).filter((item) => item.label && toSafeHttpUrl(item.url));

    const setObjectPreview = (input, target, type='avatar') => {
      input.addEventListener('change', () => {
        const file = input.files && input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          if (type === 'avatar') target.style.backgroundImage = `url('${reader.result}')`;
          if (type === 'cover') target.style.backgroundImage = `url('${reader.result}')`;
        };
        reader.readAsDataURL(file);
      });
    };

    setObjectPreview(document.getElementById('profileImageInput'), previewAvatar, 'avatar');
    setObjectPreview(document.getElementById('coverImageInput'), previewCover, 'cover');

    const renderPreview = () => {
      previewName.textContent = document.getElementById('nameInput').value.trim() || 'الاسم';
      previewBio.textContent = document.getElementById('bioInput').value.trim() || 'اكتب نبذة قصيرة عنك...';
      const socialItems = [
        ['واتساب', toSafeHttpUrl(document.getElementById('whatsappInput').value)],
        ['فيسبوك', toSafeHttpUrl(document.getElementById('facebookInput').value)],
        ['إنستغرام', toSafeHttpUrl(document.getElementById('instagramInput').value)],
        ['يوتيوب', toSafeHttpUrl(document.getElementById('youtubeInput').value)],
        ['سناب شات', toSafeHttpUrl(document.getElementById('snapchatInput').value)],
        ['تيك توك', toSafeHttpUrl(document.getElementById('tiktokInput').value)]
      ].filter((x) => x[1]);
      getCustomLinks().forEach((item) => socialItems.push([item.label, item.url]));
      previewSocials.innerHTML = socialItems.slice(0, 6).map(([label]) => `<a href="#">${label}</a>`).join('') || '<span class="muted">أضف روابط لتظهر هنا</span>';

      const username = usernameInput.value.trim();
      openPublicPageBtn.href = username ? `/u/${encodeURIComponent(username)}` : '#';
    };

    ['nameInput','bioInput','whatsappInput','facebookInput','instagramInput','youtubeInput','snapchatInput','tiktokInput','usernameInput'].forEach((id) => {
      document.getElementById(id).addEventListener('input', renderPreview);
    });

    const checkUsername = async () => {
      const value = usernameInput.value.trim().toLowerCase();
      if (!value) {
        usernameStatus.textContent = '';
        usernameAvailable = false;
        return;
      }
      if (!/^[a-z0-9][a-z0-9_-]{2,29}$/.test(value)) {
        usernameStatus.className = 'status bad';
        usernameStatus.textContent = 'اسم المستخدم يجب أن يبدأ بحرف/رقم، وطوله 3-30 (a-z, 0-9, _ -)';
        usernameAvailable = false;
        return;
      }
      const response = await fetch(`/api/creator-pages/check-username?username=${encodeURIComponent(value)}`);
      const data = await response.json();
      usernameAvailable = !!data.available;
      usernameStatus.className = `status ${usernameAvailable ? 'ok' : 'bad'}`;
      usernameStatus.textContent = usernameAvailable ? 'اسم المستخدم متاح' : 'اسم المستخدم مستخدم بالفعل';
    };

    usernameInput.addEventListener('input', () => {
      clearTimeout(usernameTimer);
      usernameTimer = setTimeout(checkUsername, 300);
    });

    const populateMe = async () => {
      const response = await fetch('/api/creator-pages/me', { headers: { Authorization: `Bearer ${token}` } });
      if (!response.ok) throw new Error('failed');
      const data = await response.json();
      const page = data.page || {};
      form.name.value = page.name || '';
      form.username.value = page.username || '';
      form.bio.value = page.bio || '';
      form.phone.value = page.phone || '';
      form.email.value = page.email || '';
      form.whatsapp.value = page.whatsapp || '';
      form.facebook.value = page.facebook || '';
      form.instagram.value = page.instagram || '';
      form.youtube.value = page.youtube || '';
      form.snapchat.value = page.snapchat || '';
      form.tiktok.value = page.tiktok || '';
      if (page.profile_image_url) previewAvatar.style.backgroundImage = `url('${page.profile_image_url}')`;
      if (page.cover_image_url) previewCover.style.backgroundImage = `url('${page.cover_image_url}')`;
      customLinks.innerHTML = '';
      (data.customLinks || []).forEach((item) => addCustomLinkRow(item.label, item.url));
      renderPreview();
      checkUsername();
    };

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      if (!token) {
        saveStatus.textContent = 'يمكنك تعبئة الصفحة الآن، لكن الحفظ يتطلب تسجيل الدخول.';
        const loginLink = document.createElement('a');
        loginLink.href = '/login-page.html';
        loginLink.style.color = '#ffb4b4';
        loginLink.style.textDecoration = 'underline';
        loginLink.style.marginInlineStart = '6px';
        loginLink.textContent = 'تسجيل الدخول';
        saveStatus.appendChild(loginLink);
        return;
      }
      if (!usernameAvailable) {
        saveStatus.textContent = 'يرجى اختيار اسم مستخدم متاح.';
        return;
      }
      saveStatus.textContent = 'جاري الحفظ...';
      const fd = new FormData(form);
      fd.set('username', usernameInput.value.trim().toLowerCase());
      fd.set('customLinks', JSON.stringify(getCustomLinks()));
      try {
        const response = await fetch('/api/creator-pages/me', {
          method: 'POST',
          headers: { Authorization: `Bearer ${token}` },
          body: fd
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'save-failed');
        saveStatus.textContent = 'تم حفظ الصفحة بنجاح.';
        if (data.page?.username) openPublicPageBtn.href = `/u/${encodeURIComponent(data.page.username)}`;
      } catch (error) {
        saveStatus.textContent = `فشل الحفظ: ${error.message}`;
      }
    });

    const loadAdmin = async () => {
      const card = document.getElementById('adminCard');
      const list = document.getElementById('adminList');
      try {
        const response = await fetch('/api/admin/creator-pages', { headers: { Authorization: `Bearer ${token}` } });
        if (!response.ok) return;
        const data = await response.json();
        card.hidden = false;
        list.innerHTML = (data.pages || []).slice(0, 20).map((page) => `
          <div style="border:1px solid #333a4a;border-radius:12px;padding:10px;background:#0e1219;">
            <div style="display:flex;justify-content:space-between;gap:10px;align-items:center;">
              <div>
                <strong>${page.name}</strong>
                <div class="muted">@${page.username} • ${page.is_enabled ? 'مفعلة' : 'معطلة'}</div>
              </div>
              <div style="display:flex; gap:6px; flex-wrap:wrap;">
                <button class="btn btn-dark" data-action="toggle" data-id="${page.id}" data-enabled="${page.is_enabled}">${page.is_enabled ? 'تعطيل' : 'تفعيل'}</button>
                <button class="btn btn-dark" data-action="delete" data-id="${page.id}">حذف</button>
              </div>
            </div>
          </div>
        `).join('');

        list.addEventListener('click', async (event) => {
          const button = event.target.closest('button[data-action]');
          if (!button) return;
          const id = button.dataset.id;
          if (button.dataset.action === 'toggle') {
            const enabled = button.dataset.enabled === 'true';
            await fetch(`/api/admin/creator-pages/${id}/status`, {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
              body: JSON.stringify({ is_enabled: !enabled })
            });
            loadAdmin();
          }
          if (button.dataset.action === 'delete') {
            await fetch(`/api/admin/creator-pages/${id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
            loadAdmin();
          }
        });
      } catch (_e) {}
    };

    if (token) {
      populateMe().catch(() => {});
      loadAdmin();
    } else {
      renderPreview();
    }
  </script>
</body>
</html>
